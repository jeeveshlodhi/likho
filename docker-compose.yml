services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: likho_user
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: likhodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://likho_user:securepassword123@db:5432/likhodb
      - REDIS_URL=redis://redis:6379/0
      # Include any other necessary environment variables here or via an env_file
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./likho-app
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
